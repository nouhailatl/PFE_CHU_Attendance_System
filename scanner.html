<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>CHU · Pointage Stagiaires</title>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --bg: #0a0d12;
        --surface: #12171f;
        --surface2: #1a2130;
        --border: #1f2d3d;
        --accent: #00d4a8;
        --accent-dim: rgba(0, 212, 168, 0.12);
        --accent-glow: rgba(0, 212, 168, 0.35);
        --danger: #ff4d6d;
        --danger-dim: rgba(255, 77, 109, 0.12);
        --warning: #f59e0b;
        --warning-dim: rgba(245, 158, 11, 0.12);
        --text: #e2e8f0;
        --text-muted: #64748b;
        --text-faint: #334155;
        --radius: 16px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        padding-bottom: env(safe-area-inset-bottom, 24px);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 168, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 168, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        top: -120px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(0, 212, 168, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 430px;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      /* ── HEADER ── */
      header {
        width: 100%;
        text-align: center;
      }

      .logo-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--accent-dim);
        border: 1px solid rgba(0, 212, 168, 0.25);
        border-radius: 100px;
        padding: 6px 14px;
        margin-bottom: 14px;
      }

      .logo-badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent-glow);
        animation: pulse 2s ease-in-out infinite;
      }

      .logo-badge span {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: var(--accent);
        text-transform: uppercase;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.85);
        }
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      h1 em {
        font-style: normal;
        color: var(--accent);
      }

      .subtitle {
        margin-top: 8px;
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 300;
      }

      /* ── CAMERA BOX ── */
      .camera-wrap {
        width: 100%;
        aspect-ratio: 1;
        position: relative;
        background: #000;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .camera-wrap::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent-glow),
          transparent
        );
        z-index: 5;
      }

      /* idle state */
      #camIdle {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        z-index: 3;
        background: #080b10;
      }

      #camIdle .idle-icon {
        font-size: 52px;
        opacity: 0.2;
      }
      #camIdle p {
        font-size: 13px;
        color: var(--text-faint);
      }

      /* html5-qrcode injects into #reader */
      #reader {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        border: none !important;
        background: #000;
      }

      /* strip all default html5-qrcode styling */
      #reader video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        border-radius: 0 !important;
        position: absolute !important;
        inset: 0 !important;
      }

      #reader__scan_region {
        background: transparent !important;
        min-height: unset !important;
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        inset: 0 !important;
      }

      #reader__dashboard {
        display: none !important;
      }
      #reader__header_message {
        display: none !important;
      }
      #reader__status_span {
        display: none !important;
      }

      /* ── VIEWFINDER ── */
      #viewfinder {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 4;
      }

      #viewfinder.active {
        display: flex;
      }

      .vf-box {
        width: 220px;
        height: 220px;
        position: relative;
      }

      .vf-box::before,
      .vf-box::after,
      .vf-box span::before,
      .vf-box span::after {
        content: "";
        position: absolute;
        width: 28px;
        height: 28px;
        border-color: var(--accent);
        border-style: solid;
      }

      .vf-box::before {
        top: 0;
        left: 0;
        border-width: 2px 0 0 2px;
        border-radius: 4px 0 0 0;
      }
      .vf-box::after {
        top: 0;
        right: 0;
        border-width: 2px 2px 0 0;
        border-radius: 0 4px 0 0;
      }
      .vf-box span::before {
        bottom: 0;
        left: 0;
        border-width: 0 0 2px 2px;
        border-radius: 0 0 0 4px;
      }
      .vf-box span::after {
        bottom: 0;
        right: 0;
        border-width: 0 2px 2px 0;
        border-radius: 0 0 4px 0;
      }

      .scan-line {
        position: absolute;
        left: 4%;
        width: 92%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: scanMove 2.4s ease-in-out infinite;
      }

      @keyframes scanMove {
        0% {
          top: 8%;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 92%;
          opacity: 0;
        }
      }

      /* ── BUTTONS ── */
      .btn-row {
        width: 100%;
        display: flex;
        gap: 10px;
      }

      .btn {
        flex: 1;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        background: var(--surface);
        color: var(--text);
      }

      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none;
      }

      .btn-start {
        background: var(--accent);
        border-color: var(--accent);
        color: #001a14;
      }
      .btn-stop {
        background: var(--danger-dim);
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ── STATUS ── */
      .status-panel {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition:
          border-color 0.3s,
          background 0.3s;
      }

      .status-panel.success {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .status-panel.error {
        border-color: var(--danger);
        background: var(--danger-dim);
      }
      .status-panel.warning {
        border-color: var(--warning);
        background: var(--warning-dim);
      }

      .status-icon {
        font-size: 20px;
        flex-shrink: 0;
      }

      .status-label {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .status-message {
        font-size: 14px;
        font-weight: 500;
        margin-top: 2px;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--text-faint);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── RESULT CARD ── */
      .result-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: none;
        flex-direction: column;
        gap: 14px;
        animation: fadeUp 0.3s ease;
      }

      .result-card.visible {
        display: flex;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-header {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .result-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }

      .result-icon.ok {
        background: var(--accent-dim);
      }
      .result-icon.err {
        background: var(--danger-dim);
      }
      .result-icon.warn {
        background: var(--warning-dim);
      }

      .result-title {
        font-size: 17px;
        font-weight: 600;
      }
      .result-title.ok {
        color: var(--accent);
      }
      .result-title.err {
        color: var(--danger);
      }
      .result-title.warn {
        color: var(--warning);
      }
      .result-subtitle {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 3px;
      }

      .result-detail {
        background: var(--surface2);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
        word-break: break-all;
      }

      .result-detail strong {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-faint);
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
      }

      .countdown-bar {
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .countdown-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        width: 100%;
      }
      .countdown-fill.warn {
        background: var(--warning);
      }
      .countdown-fill.running {
        transition: width 10s linear;
        width: 0%;
      }

      .btn-scan-next {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(0, 212, 168, 0.35);
        background: var(--accent-dim);
        color: var(--accent);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }

      .btn-scan-next:active {
        transform: scale(0.97);
        font-size: 11px;
        color: var(--text-faint);
        font-family: "DM Mono", monospace;
        text-align: center;
        padding-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="logo-badge">
          <div class="dot"></div>
          <span>CHU · Système de Pointage</span>
        </div>
        <h1>Scanner QR<br /><em>Stagiaires</em></h1>
        <p class="subtitle">Pointage automatique par QR code</p>
      </header>

      <!-- CAMERA -->
      <div class="camera-wrap">
        <div id="camIdle">
          <div class="idle-icon">📷</div>
          <p>Appuyez sur Démarrer</p>
        </div>
        <div id="reader"></div>
        <div id="viewfinder">
          <div class="vf-box">
            <span></span>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="btn-row">
        <button class="btn btn-start" id="btnStart" onclick="startScanner()">
          ▶ Démarrer
        </button>
        <button
          class="btn btn-stop"
          id="btnStop"
          onclick="stopScanner()"
          disabled
        >
          ⏹ Arrêter
        </button>
      </div>

      <!-- STATUS -->
      <div class="status-panel" id="statusPanel">
        <div class="status-icon" id="statusIcon">💤</div>
        <div>
          <div class="status-label" id="statusLabel">Caméra</div>
          <div class="status-message" id="statusMsg">
            En veille — appuyez sur Démarrer
          </div>
        </div>
      </div>

      <!-- RESULT -->
      <div class="result-card" id="resultCard"></div>

      <footer>CHU · Plateforme de Stage · v1.0</footer>
    </div>

    <script>
      const API_URL = "http://localhost:8000/scan"; // Adjust if FastAPI is on a different host/port
      const RESUME_DELAY = 10000; // ms before camera resumes after a scan

      let qrCode = null;
      let scanLocked = false;
      let resumeTimer = null;
      let isRunning = false;

      // ── STATUS ─────────────────────────────────────────────────────────────────
      function setStatus(type, icon, label, msg) {
        document.getElementById("statusPanel").className =
          "status-panel " + (type || "");
        document.getElementById("statusIcon").textContent = icon;
        document.getElementById("statusLabel").textContent = label;
        document.getElementById("statusMsg").textContent = msg;
      }

      function setLoadingStatus() {
        document.getElementById("statusPanel").className = "status-panel";
        document.getElementById("statusIcon").innerHTML =
          '<div class="spinner"></div>';
        document.getElementById("statusLabel").textContent = "Envoi en cours";
        document.getElementById("statusMsg").textContent =
          "Communication avec le serveur…";
      }

      function setBtns(running) {
        document.getElementById("btnStart").disabled = running;
        document.getElementById("btnStop").disabled = !running;
      }

      // ── START ──────────────────────────────────────────────────────────────────
      async function startScanner() {
        if (isRunning) return;
        clearResult();
        setBtns(true);

        // Step 1: request camera permission explicitly first
        setStatus("", "🔐", "Permission caméra", "Autorisation en cours…");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
          });
          // permission granted — stop the test stream, html5-qrcode will open its own
          stream.getTracks().forEach((t) => t.stop());
        } catch (err) {
          isRunning = false;
          setBtns(false);
          setStatus(
            "error",
            "🚫",
            "Accès refusé",
            "Autorisez l'accès à la caméra dans les paramètres du navigateur.",
          );
          return;
        }

        // Step 2: enumerate cameras
        setStatus("", "⏳", "Initialisation", "Recherche des caméras…");
        qrCode = new Html5Qrcode("reader", { verbose: false });

        try {
          const devices = await Html5Qrcode.getCameras();
          if (!devices || devices.length === 0)
            throw new Error("Aucune caméra détectée.");

          // Prefer rear camera by label keywords, fallback to first available
          const rearCamera = devices.find((d) => {
            const label = d.label.toLowerCase();
            return (
              label.includes("back") ||
              label.includes("rear") ||
              label.includes("environment") ||
              label.includes("arrière")
            );
          });

          const selectedCamera = rearCamera || devices[0];
          const cameraLabel = selectedCamera.label || "Caméra par défaut";

          setStatus("", "⏳", "Démarrage", `Utilisation de caméra`);

          await qrCode.start(
            selectedCamera.id,
            { fps: 25, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            () => {},
          );

          isRunning = true;
          document.getElementById("camIdle").style.display = "none";
          document.getElementById("viewfinder").classList.add("active");
          setStatus("", "📷", "En attente", `Approchez un QR code`);
        } catch (err) {
          isRunning = false;
          setBtns(false);
          setStatus(
            "error",
            "⚠️",
            "Caméra inaccessible",
            err?.message || "Aucune caméra disponible ou accès refusé.",
          );
        }
      }

      // ── STOP ───────────────────────────────────────────────────────────────────
      async function stopScanner() {
        clearTimeout(resumeTimer);
        if (qrCode && isRunning) {
          try {
            await qrCode.stop();
          } catch (e) {}
          try {
            qrCode.clear();
          } catch (e) {}
          qrCode = null;
        }
        isRunning = false;
        scanLocked = false;
        setBtns(false);
        document.getElementById("camIdle").style.display = "flex";
        document.getElementById("viewfinder").classList.remove("active");
        clearResult();
        setStatus("", "💤", "Caméra", "Arrêtée — appuyez sur Démarrer");
      }

      // ── ON SCAN ────────────────────────────────────────────────────────────────
      async function onScanSuccess(decodedText) {
        if (scanLocked) return;
        scanLocked = true;

        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

        // Pause scanner — keep last frame visible, do NOT resume yet
        try {
          qrCode.pause(true);
        } catch (e) {}

        setLoadingStatus();

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ intern_id: decodedText }),
          });
          const data = await res.json();

          if (res.ok) {
            const msg = data.message || data.status || JSON.stringify(data);

            // Detect out-of-time-window response (HTTP 200 but scan refused)
            const isOutOfWindow =
              msg.includes("refusé") ||
              msg.includes("n'est ouvert") ||
              msg.includes("créneau");

            if (isOutOfWindow) {
              setStatus("warning", "🕐", "Hors créneau", msg);
              showResult(
                "warn",
                "QR détecté — non enregistré",
                new Date().toLocaleTimeString("fr-FR"),
                msg,
                decodedText,
              );
            } else {
              setStatus("success", "✅", "Pointage validé", msg);
              showResult(
                "ok",
                "Pointage validé",
                new Date().toLocaleTimeString("fr-FR"),
                msg,
                decodedText,
              );
            }
          } else {
            const errMsg =
              data.detail || data.message || `Erreur ${res.status}`;
            setStatus("error", "❌", "Erreur serveur", errMsg);
            showResult(
              "err",
              "Refusé",
              `Code ${res.status}`,
              errMsg,
              decodedText,
            );
          }
        } catch (err) {
          setStatus(
            "error",
            "⚠️",
            "Erreur réseau",
            "Impossible de joindre le serveur. Vérifiez que FastAPI est lancé.",
          );
          showResult(
            "err",
            "Réseau indisponible",
            "Connexion échouée",
            "Impossible de joindre le serveur. FastAPI doit être lancé.",
            decodedText,
          );
        }

        // Auto-resume after full delay — scanLocked stays true until then
        // so even if qrCode.resume() briefly re-activates decoding, we ignore it
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(() => {
          clearResult();
          setStatus(
            "",
            "📷",
            "En attente",
            "Approchez un QR code de la caméra",
          );
          try {
            qrCode.resume();
          } catch (e) {}
          // unlock only AFTER resume so the first new frame isn't double-fired
          setTimeout(() => {
            scanLocked = false;
          }, 300);
        }, RESUME_DELAY);
      }

      // ── RESULT CARD ────────────────────────────────────────────────────────────
      // state: "ok" | "warn" | "err"
      function showResult(state, title, subtitle, detail, uuid) {
        const icons = { ok: "✅", warn: "🕐", err: "❌" };
        const card = document.getElementById("resultCard");
        card.className = "result-card visible";
        card.innerHTML = `
          <div class="result-header">
            <div class="result-icon ${state}">${icons[state]}</div>
            <div>
              <div class="result-title ${state}">${title}</div>
              <div class="result-subtitle">${subtitle}</div>
            </div>
          </div>
          ${uuid ? `<div class="result-detail"><strong>UUID scanné</strong>${uuid}</div>` : ""}
          ${detail ? `<div class="result-detail"><strong>Réponse serveur</strong>${detail}</div>` : ""}
          <div class="countdown-bar"><div class="countdown-fill ${state === "warn" ? "warn" : ""}" id="cdf"></div></div>
          <button class="btn-scan-next" onclick="skipToNext()">📷 Scanner un autre badge</button>
        `;
        requestAnimationFrame(() =>
          requestAnimationFrame(() => {
            const f = document.getElementById("cdf");
            if (f)
              f.className = `countdown-fill ${state === "warn" ? "warn " : ""}running`;
          }),
        );
      }

      function skipToNext() {
        clearTimeout(resumeTimer);
        clearResult();
        setStatus("", "📷", "En attente", "Approchez un QR code de la caméra");
        try {
          qrCode.resume();
        } catch (e) {}
        setTimeout(() => {
          scanLocked = false;
        }, 300);
      }

      function clearResult() {
        const card = document.getElementById("resultCard");
        card.className = "result-card";
        card.innerHTML = "";
      }
    </script>
  </body>
</html>
